# Cấu hình màn hình OLED (chỉ bên trái)
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# LVGL memory pool (built-in screen sets this auto, custom does not)
CONFIG_LV_Z_MEM_POOL_SIZE=4096

# Font Montserrat 12 có symbol FontAwesome (BT, USB icons)
CONFIG_LV_FONT_MONTSERRAT_12=y
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_12=y

# Theme mono cho OLED 1-bit
CONFIG_LV_USE_THEME_MONO=y

# Widget BT/USB profile
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
